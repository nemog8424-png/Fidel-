name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli@6
          npm install @capacitor/core@6 @capacitor/android@6

      - name: Create Capacitor project
        run: |
          npx cap init "Fidel" "com.yourname.fidel" --web-dir www

      - name: Setup www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Fix Kotlin dependency conflict
        run: |
          cd android
          sed -i "s/kotlin_version = '1.8.22'/kotlin_version = '1.9.24'/g" build.gradle
          sed -i "s/kotlin-stdlib-jdk8//g" app/build.gradle

      - name: Add microphone permission
        run: |
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fidel-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
